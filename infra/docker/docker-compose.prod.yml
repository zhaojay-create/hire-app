version: "3.9"

services:
  web:
    build: ./apps/web
    container_name: nextjs
    restart: always
    environment:
      - NODE_ENV=production
    expose:
      - "3000"

  api:
    build: ./apps/api
    container_name: go-api
    restart: always
    expose:
      - "8080"
      
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - api